<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Codetyper PRO 😎</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>💻</text></svg>">

<style>
body {
  background: radial-gradient(circle at top, #020202, #000);
  color: lime;
  font-family: monospace;
  margin: 0;
  padding: 20px;
}

#container {
  max-width: 900px;
  margin: auto;
}

#header {
  font-size: 32px;
  text-align: center;
  text-shadow: 0 0 10px lime;
}

#stats {
  text-align: center;
  margin: 10px;
  color: #aaa;
}

#progressBar {
  height: 5px;
  background: lime;
  width: 0%;
  transition: 0.2s;
}

#screen {
  background: black;
  border: 1px solid lime;
  height: 400px;
  overflow-y: auto;
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 8px;
  background: black;
  color: lime;
  border: 1px solid lime;
  cursor: pointer;
}

#event {
  color: red;
  text-align: center;
  height: 20px;
}
</style>

</head>

<body>
<div id="container">

<h1 id="header">Codetyper PRO 😎</h1>

<div id="stats">
  Nível: <span id="level">1</span> |
  XP: <span id="xp">0</span> |
  Linhas: <span id="lines">0</span>
</div>

<div id="progressBar"></div>

<div id="event"></div>

<pre id="screen"></pre>

<button onclick="toggleAuto()">Modo Auto</button> <button onclick="clearScreen()">Limpar Tela</button>

</div>

<script>
const screen = document.getElementById("screen");
const levelEl = document.getElementById("level");
const xpEl = document.getElementById("xp");
const linesEl = document.getElementById("lines");
const bar = document.getElementById("progressBar");
const eventDiv = document.getElementById("event");

let texto = "";
let xp = 0;
let level = 1;
let lines = 0;
let auto = false;

// carregar banco
fetch("https://cdn.jsdelivr.net/gh/arthurmigue6557-maker/codetyper@main/banco.txt")
.then(r => r.text())
.then(data => texto = data);

// som
const ctx = new (window.AudioContext || window.webkitAudioContext)();
function beep(){
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.frequency.value = 400 + Math.random()*200;
  g.gain.value = 0.05;
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.03);
}

// pegar texto
function getChunk(){
  const size = Math.floor(Math.random()*10)+5;
  const start = Math.floor(Math.random()*(texto.length-size));
  return texto.substring(start, start+size);
}

// digitação
function type(text){
  let i=0;
  function loop(){
    if(i>=text.length) return;

    const span = document.createElement("span");
    span.textContent = text[i];
    span.style.color = Math.random()>0.8 ? "yellow":"lime";

    screen.appendChild(span);
    screen.scrollTop = screen.scrollHeight;

    i++;

    gainXP();
    randomEvent();
    glitch();
    beep();

    setTimeout(loop, Math.random()*20);
  }
  loop();
}

// progresso
function gainXP(){
  xp++;
  lines++;

  if(xp >= level*100){
    xp = 0;
    level++;
    showEvent("LEVEL UP 🚀");
  }

  xpEl.textContent = xp;
  levelEl.textContent = level;
  linesEl.textContent = lines;

  bar.style.width = (xp/(level*100))*100 + "%";
}

// eventos
function showEvent(msg){
  eventDiv.textContent = msg;
  setTimeout(()=>eventDiv.textContent="",1000);
}

function randomEvent(){
  if(Math.random()>0.98){
    const eventos=[
      "ACCESS GRANTED",
      "FIREWALL BYPASSED",
      "TRACE DETECTED",
      "ROOT ACCESS"
    ];
    showEvent(eventos[Math.floor(Math.random()*eventos.length)]);
  }
}

// glitch
function glitch(){
  if(Math.random()>0.995){
    document.body.style.filter="invert(1)";
    setTimeout(()=>document.body.style.filter="",100);
  }
}

// auto mode
function toggleAuto(){
  auto = !auto;
  if(auto) autoLoop();
}

function autoLoop(){
  if(!auto) return;
  type(getChunk());
  setTimeout(autoLoop, 80);
}

// limpar
function clearScreen(){
  screen.textContent="";
}

// input
document.addEventListener("keydown", ()=>type(getChunk()));
document.addEventListener("touchstart", ()=>type(getChunk()));
</script>

</body>
</html>
